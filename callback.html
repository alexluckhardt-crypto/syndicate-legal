<!DOCTYPE html>
<html>
<head>
  <title>Connecting to Syndicate…</title>
  <style>
    body { font-family: -apple-system, sans-serif; display: flex; align-items: center;
           justify-content: center; height: 100vh; margin: 0; background: #0d0d1a; color: #e2e8f0; }
    .box { text-align: center; }
    h2 { color: #7c3aed; }
    p { color: #94a3b8; }
  </style>
</head>
<body>
  <div class="box">
    <h2>Connecting…</h2>
    <p>Returning to Syndicate. You can close this tab.</p>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code  = params.get("code");
    const error = params.get("error_description") || params.get("error");
    const dest  = code
      ? "http://localhost:8765/callback?code=" + encodeURIComponent(code)
      : "http://localhost:8765/callback?error_description=" + encodeURIComponent(error || "cancelled");
    window.location.href = dest;
  </script>
</body>
</html>
